name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"  # Weekly Monday 06:23 UTC

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ontology: ${{ steps.filter.outputs.ontology }}
      compliance: ${{ steps.filter.outputs.compliance }}
      datasets: ${{ steps.filter.outputs.datasets }}
      models: ${{ steps.filter.outputs.models }}
      tools: ${{ steps.filter.outputs.tools }}
      rlhf: ${{ steps.filter.outputs.rlhf }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ontology:
              - 'packages/ontology/**'
            compliance:
              - 'packages/compliance/**'
            datasets:
              - 'packages/datasets/**'
            models:
              - 'packages/models/**'
            tools:
              - 'packages/tools/**'
            rlhf:
              - 'packages/rlhf/**'
            deploy:
              - 'deploy/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile-check all Python files
        run: find packages -name "*.py" -exec python3 -c "import py_compile; py_compile.compile('{}', doraise=True)" \;

  test-ontology:
    needs: detect-changes
    if: needs.detect-changes.outputs.ontology == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ontology[dev]"
      - run: pytest packages/ontology/ -v

  test-compliance:
    needs: detect-changes
    if: needs.detect-changes.outputs.compliance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/compliance[dev]"
      - run: pytest packages/compliance/ -v

  test-datasets:
    needs: detect-changes
    if: needs.detect-changes.outputs.datasets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ontology" && pip install -e "packages/datasets[dev]"
      - run: pytest packages/datasets/ -v

  test-models:
    needs: detect-changes
    if: needs.detect-changes.outputs.models == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ontology" && pip install -e "packages/models[dev]"
      - run: pytest packages/models/ -v

  test-tools:
    needs: detect-changes
    if: needs.detect-changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ontology" && pip install -e "packages/tools[dev]"
      - run: pytest packages/tools/ -v

  test-rlhf:
    needs: detect-changes
    if: needs.detect-changes.outputs.rlhf == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/rlhf[dev]"
      - run: pytest packages/rlhf/ -v

  mock-staleness:
    needs: detect-changes
    if: needs.detect-changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx
      - name: Check mock staleness (warning only)
        run: python scripts/check_mock_staleness.py

  test-live-adapters:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ontology" && pip install -e "packages/tools[dev]"
      - name: Run live adapter tests
        run: pytest packages/tools/tests/test_live_adapters.py -m live -v --timeout=30
