# Context File: Oxford Nanopore Long-Read Sequencing Data Source Guide
# Schema: context_file.schema.json v1.0.0
# Category: data_source_guide

context_id: rare_ctx_datasource_nanopore_longread
title: "Oxford Nanopore Long-Read Sequencing Data Source Guide"
version: "1.0.0"
category: data_source_guide
quality_tier: validated

description: >-
  Expert knowledge for interpreting Oxford Nanopore long-read sequencing data
  in rare disease diagnostics. Covers what long-read sequencing reveals that
  short-read whole-genome sequencing (WGS) misses, when to order it, how to
  interpret structural variant calls and methylation data, and which clinical
  tools to consult for downstream analysis.

when_to_use:
  presenting_features:
    - "Suspected repeat expansion disorder"
    - "Short-read WGS inconclusive despite strong clinical suspicion"
    - "Suspected structural variant (inversion, translocation, large deletion)"
    - "Suspected imprinting/methylation disorder"
  patient_context: >-
    Patients with a clear clinical phenotype but negative or inconclusive
    standard genetic testing (karyotype, CMA, short-read WGS/WES). Particularly
    relevant for neurological presentations where repeat expansions are common
    (ataxias, intellectual disability, movement disorders).
  trigger_condition: >-
    Negative short-read WGS + strong phenotypic match to a known repeat
    expansion or structural variant disorder, OR methylation abnormality
    suspected from clinical presentation.
  prerequisites:
    - "Short-read WGS or WES results (ideally negative, to justify escalation)"
    - "Clinical phenotype documented with HPO terms"
    - "Family history if available (inheritance pattern narrows candidates)"

