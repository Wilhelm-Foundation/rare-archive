# Stage 1: Supervised Fine-Tuning — Clinical diagnostic reasoning
num_train_epochs: 3
warmup_ratio: 0.1
weight_decay: 0.01
lr_scheduler_type: "cosine"

# Data (paths relative to workspace root)
train_data: "data/combined_train.jsonl"
eval_data: "data/combined_val.jsonl"

# Logging
report_to: "tensorboard"

output_dir: "outputs/stage1_sft"
