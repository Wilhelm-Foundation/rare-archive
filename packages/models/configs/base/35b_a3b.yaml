# Qwen3.5-35B-A3B MoE base configuration
# Uses Unsloth QLoRA (bf16) — loads in ~30s on A100-80GB
# lora_dropout MUST be 0.0 for MoE (nonzero causes ParamWrapper gradient bugs)
# TORCHDYNAMO_DISABLE=1 required at runtime
model_name: "Qwen/Qwen3.5-35B-A3B"
model_size: "35b-a3b"
architecture: "moe"

lora_rank: 32
lora_alpha: 64
lora_dropout: 0.0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

max_seq_length: 4096
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1e-4
bf16: true
gradient_checkpointing: true

# MoE uses Unsloth QLoRA (bf16 precision, not 4-bit despite config flag)
# Trainable: 1.86B / 36.97B (5.04%). VRAM: ~72.3 GB on A100-80GB.
load_in_4bit: false
