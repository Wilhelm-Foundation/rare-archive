# Qwen3.5-27B base configuration
model_name: "Qwen/Qwen3.5-27B"
model_size: "27b"
architecture: "dense"

lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

max_seq_length: 4096
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1e-4
bf16: true
gradient_checkpointing: true

load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"
