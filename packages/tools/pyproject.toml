[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rare-archive-tool-harness"
version = "0.1.0"
description = "7 clinical tool adapters (ClinVar, Orphanet, HPO, PanelApp, gnomAD, PubMed, DiffDx) for the Rare AI Archive agentic system"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
redis = [
    "redis>=5.0",
]
mcp = [
    "mcp>=1.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "live: tests hitting real external APIs (skipped by default)",
    "e2e: end-to-end tests requiring L2 deployment (skipped by default)",
]
addopts = "-m 'not live and not e2e'"

[tool.setuptools.packages.find]
where = ["src"]
