# Rare AI Archive — NGINX location blocks
# Add to existing lattice.conf server block on port 8000
#
# Usage: Include this file or copy blocks into lattice.conf

# Auth validation endpoint (internal — NGINX auth_request only)
location = /_archive_auth {
    internal;
    proxy_pass http://rare-archive-auth-proxy:8090/validate;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    # Forward cookies so the auth proxy can check the JupyterHub session
    proxy_set_header Cookie $http_cookie;
}

# OpenWebUI — Clinical interface (authenticated via JupyterHub)
location /archive/ {
    # Validate JupyterHub session via auth proxy sidecar
    auth_request /_archive_auth;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;
    auth_request_set $auth_user_name $upstream_http_x_auth_user_name;

    proxy_pass http://rare-archive-openwebui:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pass authenticated user identity to OpenWebUI (trusted header auth)
    proxy_set_header X-Remote-User-Email $auth_user_email;
    proxy_set_header X-Remote-User-Name $auth_user_name;

    # WebSocket support for streaming
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Long timeout for model inference
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Archive API — ELO tracking and preference export
location /elo/ {
    proxy_pass http://rare-archive-api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# llama-server primary — Health and metrics
location /archive/api/primary/ {
    proxy_pass http://rare-archive-llama-primary:8080/;
    proxy_set_header Host $host;
}

# llama-server arena — Health and metrics
location /archive/api/arena/ {
    proxy_pass http://rare-archive-llama-arena:8080/;
    proxy_set_header Host $host;
}
